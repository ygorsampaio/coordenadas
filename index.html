<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbbf24" />
  <meta name="description" content="Encontre coordenadas e salve seus lugares favoritos" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Localizador" />

  <!-- Open Graph -->
  <meta property="og:title" content="Localizador" />
  <meta property="og:description" content="Encontre coordenadas e salve seus lugares favoritos" />
  <meta property="og:type" content="website" />

  <title>Localizador</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">

    <!-- ── Header ───────────────────────────────────────── -->
    <header class="header">
      <div class="header-inner">
        <div class="header-brand">
          <div class="header-logo" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 3C11.03 3 7 7.03 7 12C7 19 16 29 16 29C16 29 25 19 25 12C25 7.03 20.97 3 16 3Z" fill="currentColor"/>
              <circle cx="16" cy="12" r="3.5" fill="#060a12"/>
            </svg>
          </div>
          <span class="header-title">Localizador</span>
        </div>

        <!-- PWA Install button (only shows when installable) -->
        <button class="btn-install" id="btnInstall" hidden aria-label="Instalar app">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Instalar
        </button>
      </div>
    </header>

    <!-- ── Main Content ──────────────────────────────────── -->
    <main class="main" id="main">

      <!-- ════ TAB: BUSCAR ════════════════════════════════ -->
      <section class="tab-panel active" id="panel-buscar" role="tabpanel" aria-labelledby="tab-buscar">

        <div class="search-area">
          <div class="search-row">
            <div class="search-input-wrap">
              <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
              </svg>
              <input
                type="search"
                id="inputLocal"
                class="search-input"
                placeholder="Digite um lugar..."
                autocomplete="off"
                enterkeyhint="search"
                aria-label="Buscar lugar"
              />
            </div>
            <button class="btn-search" id="btnBuscar" aria-label="Pesquisar">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </button>
          </div>

          <!-- Geolocation Hardware Button -->
          <button class="btn-geo" id="btnGeo" aria-label="Usar minha localização GPS">
            <span class="btn-geo-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
              </svg>
            </span>
            <span class="btn-geo-label">Usar minha localização</span>
            <span class="btn-geo-badge">GPS</span>
          </button>
        </div>

        <!-- Resultado da busca -->
        <div class="result-area" id="resultado" role="region" aria-live="polite" aria-label="Resultado da busca"></div>

      </section>

      <!-- ════ TAB: SALVOS ════════════════════════════════ -->
      <section class="tab-panel" id="panel-salvos" role="tabpanel" aria-labelledby="tab-salvos" hidden>
        <div class="salvos-header">
          <h2 class="salvos-title">Locais Salvos</h2>
          <span class="salvos-count" id="salvosCount">0</span>
        </div>
        <div class="salvos-list" id="listasSalvos" role="list" aria-label="Lista de locais salvos">
          <!-- Items inserted by JS -->
        </div>
      </section>

    </main>

    <!-- ── Bottom Nav ─────────────────────────────────── -->
    <nav class="bottom-nav" role="tablist" aria-label="Navegação principal">
      <button class="nav-btn active" id="tab-buscar" role="tab" aria-selected="true" aria-controls="panel-buscar" data-panel="buscar">
        <span class="nav-btn-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <span class="nav-btn-label">Buscar</span>
      </button>
      <button class="nav-btn" id="tab-salvos" role="tab" aria-selected="false" aria-controls="panel-salvos" data-panel="salvos">
        <span class="nav-btn-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </span>
        <span class="nav-btn-label">Salvos</span>
      </button>
    </nav>

  </div>

  <!-- ── Edit Modal (Bottom Sheet) ──────────────────── -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal-sheet" id="modalSheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-handle" aria-hidden="true"></div>
      <h3 class="modal-title" id="modalTitle">Editar local</h3>

      <label class="modal-label" for="modalLabel">Nome</label>
      <input type="text" id="modalLabel" class="modal-input" placeholder="Ex: Casa, Trabalho..." maxlength="80" />

      <label class="modal-label" for="modalNotes">Anotações <span class="modal-optional">(opcional)</span></label>
      <textarea id="modalNotes" class="modal-textarea" placeholder="Ex: Endereço completo, referência..." maxlength="200" rows="3"></textarea>

      <div class="modal-actions">
        <button class="btn-modal-cancel" id="btnModalCancel">Cancelar</button>
        <button class="btn-modal-save" id="btnModalSave">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ── Toast Notifications ────────────────────────── -->
  <div class="toast-container" id="toastContainer" aria-live="assertive" aria-atomic="true"></div>

  <script src="script.js"></script>
</body>
</html>
